    </text>
    <g transform="translate(58 226)">
      <rect width="184" height="92" rx="16" fill="#25253d" stroke="#474766" />
      <text x="22" y="38" fill="#ffffff" font-size="20" font-weight="700">
        Static HTML
      </text>
      <text x="22" y="65" fill="#aaaac0" font-size="13">
        Readable before hydration
      </text>
    </g>
    <g transform="translate(268 226)">
      <rect width="184" height="92" rx="16" fill="#25253d" stroke="#474766" />
      <text x="22" y="38" fill="#ffffff" font-size="20" font-weight="700">
        Local search
      </text>
      <text x="22" y="65" fill="#aaaac0" font-size="13">
        Fast, deterministic index
      </text>
    </g>
    <g transform="translate(478 226)">
      <rect width="184" height="92" rx="16" fill="#25253d" stroke="#474766" />
      <text x="22" y="38" fill="#ffffff" font-size="20" font-weight="700">
        Markdown
      </text>
      <text x="22" y="65" fill="#aaaac0" font-size="13">
        Clean route output
      </text>
    </g>
    <g transform="translate(163 340)">
      <rect width="184" height="72" rx="16" fill="#302d69" stroke="#625bd5" />
      <text
        x="92"
        y="44"
        text-anchor="middle"
        fill="#ffffff"
        font-size="20"
        font-weight="700"
