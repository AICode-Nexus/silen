        llms.txt
      </text>
    </g>
    <g transform="translate(373 340)">
      <rect width="184" height="72" rx="16" fill="#302d69" stroke="#625bd5" />
      <text
        x="92"
        y="34"
        text-anchor="middle"
        fill="#ffffff"
        font-size="19"
        font-weight="700"
      >
        Optional MCP
      </text>
      <text x="92" y="54" text-anchor="middle" fill="#c9c6ff" font-size="12">
        permission-gated
      </text>
    </g>
