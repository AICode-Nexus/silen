name: Deploy Silen website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/pages.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'src/**'
      - 'tsconfig*.json'
      - 'tsup.config.ts'
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Silen website
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0

      - name: Install pinned pnpm
        run: npm install --global pnpm@10.34.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Silen and its website
        run: pnpm site:build

      - name: Assert upload artifact has no source maps
        run: pnpm check:no-maps dist website/.silen/dist

      - name: Assert public Agent Contract is present
        run: test -f website/.silen/dist/.well-known/silen/manifest.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/.silen/dist
          include-hidden-files: true

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v5
