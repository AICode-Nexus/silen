name: Core quality gate

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Static checks (Node 20.19.0)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.0

      - name: Install pinned pnpm
        run: npm install --global pnpm@10.34.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run static quality gate
        run: >-
          pnpm format:check &&
          pnpm lint &&
          pnpm typecheck

  runtime-release:
    name: Runtime and release gate (Node ${{ matrix.node-version }})
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.19.0, 22.12.0]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pinned pnpm
        run: npm install --global pnpm@10.34.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build distributable CLI and package
        run: pnpm build

      - name: Assert package has no source maps
        run: pnpm check:no-maps dist

      - name: Run single-worker tests, built stdio, and package smoke
        run: pnpm test

      - name: Validate published package metadata
        run: pnpm exec publint

  browser:
    name: Full browser gate (Node 20.19.0)
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.0

      - name: Install pinned pnpm
        run: npm install --global pnpm@10.34.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build generated package assets
        run: pnpm build

      - name: Assert package has no source maps
        run: pnpm check:no-maps dist

      - name: Install pinned Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run full browser gate, including AI
        run: pnpm exec playwright test tests/e2e
