name: Core quality gate

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Static checks (Node 20.19.0)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.12.0 --activate
          corepack pnpm --version

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run static quality gate
        run: >-
          corepack pnpm format:check &&
          corepack pnpm lint &&
          corepack pnpm typecheck

  runtime-release:
    name: Runtime and release gate (Node ${{ matrix.node-version }})
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.19.0, 22.12.0]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.12.0 --activate
          corepack pnpm --version

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build distributable CLI and package
        run: corepack pnpm build

      - name: Run single-worker tests, built stdio, and package smoke
        run: corepack pnpm test -- --maxWorkers=1 --no-file-parallelism

      - name: Validate published package metadata
        run: corepack pnpm exec publint

  browser:
    name: Full browser gate (Node 20.19.0)
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.12.0 --activate
          corepack pnpm --version

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install pinned Playwright Chromium
        run: corepack pnpm exec playwright install --with-deps chromium

      - name: Run full browser gate, including AI
        run: corepack pnpm exec playwright test tests/e2e
